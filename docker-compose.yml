services:
  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: milkmart-app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    environment:
      - DB_HOST=oracle
    depends_on:
      oracle:
        condition: service_healthy
    networks:
      - milkmart

  webserver:
    image: nginx:alpine
    container_name: milkmart-webserver
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - milkmart

  oracle:
    image: gvenzl/oracle-xe:21-slim-faststart
    container_name: milkmart-oracle
    ports:
      # Host port 1522 (not 1521) — many dev machines already run a local
      # Oracle listener on 1521. Containers still talk to `oracle:1521` on
      # the internal Docker network regardless of this host-side mapping.
      - "1522:1521"
      - "5501:5500"
    environment:
      - ORACLE_PASSWORD=${ORACLE_PASSWORD:-OracleRoot123}
      - APP_USER=${DB_USERNAME:-milkmart}
      - APP_USER_PASSWORD=${DB_PASSWORD:-OracleApp123}
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    networks:
      - milkmart

  node:
    image: node:20-alpine
    container_name: milkmart-node
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./:/app
    ports:
      - "5173:5173"
    networks:
      - milkmart

networks:
  milkmart:
    driver: bridge

volumes:
  oracle-data:
